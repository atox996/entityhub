name: Release

on:
  push:
    tags:
      - 'core-v*'
      - 'plugin-v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install

      - run: pnpm build

      - name: Publish core
        if: startsWith(github.ref, 'refs/tags/core-v')
        run: pnpm --filter entityhub publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish plugin
        if: startsWith(github.ref, 'refs/tags/plugin-v')
        run: pnpm --filter @entityhub/plugin publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
